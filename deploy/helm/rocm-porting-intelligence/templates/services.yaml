apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  type: {{ .Values.service.type }}
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: {{ .Values.backend.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  type: {{ .Values.service.type }}
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: {{ .Values.frontend.port }}
